<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A minimal public website for Negasi." />
  <title>Negasi</title>
  <style>
    :root {
      --bg: #f8f7f3;
      --text: #1f2328;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #2f5d50;
      --max: 820px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      font-size: 16px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      color: var(--accent);
    }

    .site-header {
      position: sticky;
      top: 0;
      background: rgba(248, 247, 243, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    section {
      padding: 5rem 0;
      border-bottom: 1px solid var(--line);
    }

    section:last-of-type {
      border-bottom: 0;
    }

    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1, h2, h3 {
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    h1 {
      max-width: 680px;
      font-size: clamp(2.8rem, 7vw, 5.4rem);
      margin-bottom: 1rem;
    }

    h2 {
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      margin-bottom: 1rem;
    }

    h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .lead,
    .section-text,
    .post-card p,
    footer {
      color: var(--muted);
    }

    .lead {
      max-width: 620px;
      font-size: clamp(1.08rem, 2vw, 1.25rem);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .tag {
      color: var(--accent);
      font-size: 0.92rem;
    }

    .tag:not(:last-child)::after {
      content: "·";
      margin-left: 0.6rem;
      color: var(--muted);
    }

    .post-card {
      max-width: 620px;
    }

    .email-placeholder {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.95rem;
    }

    footer {
      max-width: var(--max);
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      section {
        padding: 4rem 0;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="#home">Negasi</a>
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#blog">Blog</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="home">
      <p class="eyebrow">Home</p>
      <h1>Negasi</h1>
      <p class="lead">Engineering, science, technology, and policy.</p>

      <div class="tag-list" aria-label="Focus areas">
        <span class="tag">Engineering</span>
        <span class="tag">Chemistry</span>
        <span class="tag">Materials</span>
        <span class="tag">AI</span>
        <span class="tag">Robotics</span>
        <span class="tag">Quantum</span>
        <span class="tag">Policy</span>
      </div>
    </section>

    <section id="blog">
      <p class="eyebrow">Blog</p>
      <h2>Writing</h2>
      <div class="post-card">
        <h3>Coming soon</h3>
        <p>Short notes and updates.</p>
      </div>
    </section>

    <section id="contact">
      <p class="eyebrow">Contact</p>
      <h2>Contact</h2>
      <p class="section-text">Email for communication.</p>
      <span class="email-placeholder">Add public email</span>
    </section>
  </main>

  <footer>
    © 2026 Negasi
  </footer>
</body>
</html>
